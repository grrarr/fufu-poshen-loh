<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christopher's Po-Shen Loh Progress</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #0a0e27;
      color: #e0e0e0;
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #4da6ff; margin-bottom: 10px; font-size: 2em; }
    .header-info { color: #888; font-size: 0.9em; margin-bottom: 30px; }
    .section { margin-bottom: 40px; }
    .section-title {
      font-size: 1.3em;
      color: #66d9ff;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #333;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .card {
      background: #1a1f3a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      transition: all 0.2s;
    }
    .card:hover { border-color: #555; background: #232842; }
    .card-title {
      font-weight: bold;
      color: #4da6ff;
      margin-bottom: 10px;
      font-size: 1.1em;
    }
    .progress-bar {
      background: #111;
      border-radius: 4px;
      height: 6px;
      margin: 8px 0;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, #00d4ff, #66d9ff);
      height: 100%;
      transition: width 0.3s;
    }
    .percentage { color: #66d9ff; font-weight: bold; font-size: 0.95em; }
    .notes-section {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #333;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .checkbox-label {
      flex: 1;
      cursor: pointer;
    }
    textarea {
      width: 100%;
      background: #0a0e27;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 8px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 0.9em;
      margin-top: 6px;
      resize: vertical;
      min-height: 60px;
    }
    textarea:focus { outline: none; border-color: #66d9ff; }
    .input-label { font-size: 0.85em; color: #888; margin-bottom: 4px; display: block; }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      background: #1a3a52;
      color: #4da6ff;
      border: 1px solid #4da6ff;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.2s;
    }
    button:hover { background: #2a4a62; }
    button.danger {
      background: #3a1a1a;
      color: #ff6b6b;
      border-color: #ff6b6b;
    }
    button.danger:hover { background: #4a2a2a; }
    .flags-section {
      background: #1a1f3a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 15px;
    }
    .flag-item {
      background: #0a0e27;
      border-left: 3px solid #ff6b6b;
      padding: 10px;
      margin: 8px 0;
      border-radius: 4px;
    }
    .summary-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #1a1f3a;
      border: 1px solid #333;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-number { font-size: 2em; color: #66d9ff; font-weight: bold; }
    .stat-label { color: #888; font-size: 0.9em; margin-top: 5px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const DEFAULT_DATA = {
      modules: [
        { id: 'mod0', name: 'Module 0: Introduction', progress: 98, notesAdded: false, notesComment: '' },
        { id: 'mod1', name: 'Module 1: Algebra Basics', progress: 100, notesAdded: false, notesComment: '' },
        { id: 'mod2', name: 'Module 2: Geometry Tools', progress: 95, notesAdded: false, notesComment: '' },
        { id: 'mod3', name: 'Module 3: Algebra Tools', progress: 98, notesAdded: false, notesComment: '' },
        { id: 'mod4', name: 'Module 4: Combinatorics Tools', progress: 15, notesAdded: false, notesComment: '' },
        { id: 'mod5', name: 'Module 5: Number Theory Tools', progress: 0, notesAdded: false, notesComment: '' },
      ],
      workouts: [
        { id: 'w1a', name: 'Workout 1A: Algebra Basics', progress: 100, notesAdded: false, notesComment: '' },
        { id: 'w1b', name: 'Workout 1B: Algebra Basics', progress: 100, notesAdded: false, notesComment: '' },
        { id: 'w2a', name: 'Workout 2A: Geometry Tools', progress: 0, notesAdded: false, notesComment: '' },
        { id: 'w3a', name: 'Workout 3A: Algebra Tools', progress: 0, notesAdded: false, notesComment: '' },
        { id: 'w4a', name: 'Workout 4A: Combinatorics Tools', progress: 3, notesAdded: false, notesComment: '' },
        { id: 'w5a', name: 'Workout 5A: Number Theory Tools', progress: 0, notesAdded: false, notesComment: '' },
      ],
      flags: [],
      lastUpdated: new Date().toISOString().split('T')[0],
    };

    window.storage = {
      getItem(key) {
        try {
          return localStorage.getItem(key);
        } catch (e) {
          return null;
        }
      },
      setItem(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch (e) {
          console.error('Storage error:', e);
        }
      },
    };

    function App() {
      const [data, setData] = useState(null);
      const [newFlag, setNewFlag] = useState('');

      useEffect(() => {
        const stored = window.storage.getItem('christopher-psl-v1');
        const backup = window.storage.getItem('christopher-psl-v1-backup');
        const loaded = stored ? JSON.parse(stored) : backup ? JSON.parse(backup) : DEFAULT_DATA;
        setData(loaded);
      }, []);

      const save = (newData) => {
        setData(newData);
        window.storage.setItem('christopher-psl-v1', JSON.stringify(newData));
        window.storage.setItem('christopher-psl-v1-backup', JSON.stringify(newData));
      };

      const updateItem = (type, id, updates) => {
        const newData = { ...data, lastUpdated: new Date().toISOString().split('T')[0] };
        const arr = type === 'module' ? [...data.modules] : [...data.workouts];
        const idx = arr.findIndex(x => x.id === id);
        if (idx >= 0) {
          arr[idx] = { ...arr[idx], ...updates };
          newData[type === 'module' ? 'modules' : 'workouts'] = arr;
          save(newData);
        }
      };

      const addFlag = () => {
        if (!newFlag.trim()) return;
        const newData = { ...data, flags: [...data.flags, { id: Date.now(), text: newFlag }], lastUpdated: new Date().toISOString().split('T')[0] };
        save(newData);
        setNewFlag('');
      };

      const removeFlag = (id) => {
        const newData = { ...data, flags: data.flags.filter(f => f.id !== id), lastUpdated: new Date().toISOString().split('T')[0] };
        save(newData);
      };

      const exportData = () => {
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `christopher-psl-backup-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
      };

      if (!data) return <div style={{color: '#666'}}>Loading...</div>;

      const modulesComplete = data.modules.filter(m => m.progress === 100).length;
      const workoutsComplete = data.workouts.filter(w => w.progress === 100).length;
      const modulesWithNotes = data.modules.filter(m => m.notesAdded).length;
      const workoutsWithNotes = data.workouts.filter(w => w.notesAdded).length;

      return (
        <div className="container">
          <h1>Christopher's Po-Shen Loh Progress</h1>
          <div className="header-info">
            <strong>App URL:</strong> https://grrarr.github.io/fufu-poshen-loh/ |
            <strong> Last updated:</strong> {data.lastUpdated}
          </div>

          <div className="summary-stats">
            <div className="stat-card">
              <div className="stat-number">{modulesComplete}/6</div>
              <div className="stat-label">Modules Complete</div>
            </div>
            <div className="stat-card">
              <div className="stat-number">{workoutsComplete}/6</div>
              <div className="stat-label">Workouts Complete</div>
            </div>
            <div className="stat-card">
              <div className="stat-number">{modulesWithNotes}</div>
              <div className="stat-label">Modules w/ Notes</div>
            </div>
            <div className="stat-card">
              <div className="stat-number">{workoutsWithNotes}</div>
              <div className="stat-label">Workouts w/ Notes</div>
            </div>
          </div>

          <div className="section">
            <div className="section-title">📚 Modules</div>
            <div className="grid">
              {data.modules.map(mod => (
                <ItemCard key={mod.id} item={mod} type="module" onUpdate={(updates) => updateItem('module', mod.id, updates)} />
              ))}
            </div>
          </div>

          <div className="section">
            <div className="section-title">💪 Workouts</div>
            <div className="grid">
              {data.workouts.map(wo => (
                <ItemCard key={wo.id} item={wo} type="workout" onUpdate={(updates) => updateItem('workout', wo.id, updates)} />
              ))}
            </div>
          </div>

          <div className="section">
            <div className="section-title">⚠️ Manual Flags (Exams Not Done, etc.)</div>
            <div className="flags-section">
              {data.flags.length > 0 && (
                <div style={{marginBottom: '15px'}}>
                  {data.flags.map(flag => (
                    <div key={flag.id} className="flag-item">
                      <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start'}}>
                        <div>{flag.text}</div>
                        <button className="danger" onClick={() => removeFlag(flag.id)} style={{padding: '4px 8px', fontSize: '0.8em'}}>✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              <textarea value={newFlag} onChange={(e) => setNewFlag(e.target.value)} placeholder="e.g., Module 0 - Exam 2 not done&#10;Module 3 - Exam final not done" />
              <button onClick={addFlag} style={{marginTop: '10px', background: '#1a3a2a', color: '#4dff88', borderColor: '#4dff88'}}>Add Flag</button>
            </div>
          </div>

          <div className="section">
            <div className="button-group">
              <button onClick={exportData}>📥 Export Backup (JSON)</button>
            </div>
          </div>
        </div>
      );
    }

    function ItemCard({ item, type, onUpdate }) {
      const [editingComment, setEditingComment] = useState(false);

      return (
        <div className="card">
          <div className="card-title">{item.name}</div>

          <div>
            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px'}}>
              <span className="percentage">{item.progress}%</span>
              <input
                type="range"
                min="0"
                max="100"
                value={item.progress}
                onChange={(e) => onUpdate({progress: parseInt(e.target.value)})}
                style={{flex: 1, marginLeft: '10px', cursor: 'pointer'}}
              />
            </div>
            <div className="progress-bar">
              <div className="progress-fill" style={{width: `${item.progress}%`}}></div>
            </div>
          </div>

          <div className="notes-section">
            <div className="checkbox-group">
              <input
                type="checkbox"
                id={`${item.id}-notes`}
                checked={item.notesAdded}
                onChange={(e) => onUpdate({notesAdded: e.target.checked})}
              />
              <label className="checkbox-label" htmlFor={`${item.id}-notes`}>
                Spaced rep notes added
              </label>
            </div>
            {(item.notesAdded || item.notesComment) && (
              <div style={{marginTop: '10px'}}>
                {editingComment || !item.notesComment ? (
                  <textarea
                    value={item.notesComment}
                    onChange={(e) => onUpdate({notesComment: e.target.value})}
                    placeholder="e.g., Lessons 1-10 noted, 14-15 missing"
                    onBlur={() => setEditingComment(false)}
                    autoFocus
                  />
                ) : (
                  <div
                    onClick={() => setEditingComment(true)}
                    style={{
                      background: '#0a0e27',
                      padding: '8px',
                      borderRadius: '4px',
                      border: '1px solid #333',
                      cursor: 'pointer',
                      fontSize: '0.9em',
                      color: '#aaa'
                    }}
                  >
                    {item.notesComment}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
