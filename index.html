<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christopher's Po-Shen Loh Progress</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #0a0e27;
      color: #e0e0e0;
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #4da6ff; margin-bottom: 10px; font-size: 2em; }
    .header-info { color: #888; font-size: 0.9em; margin-bottom: 10px; }
    .section { margin-bottom: 40px; }
    .section-title {
      font-size: 1.3em;
      color: #66d9ff;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #333;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .card {
      background: #1a1f3a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      transition: all 0.2s;
    }
    .card:hover { border-color: #555; background: #232842; }
    .card-title {
      font-weight: bold;
      color: #4da6ff;
      margin-bottom: 10px;
      font-size: 1.1em;
    }
    .progress-bar {
      background: #111;
      border-radius: 4px;
      height: 6px;
      margin: 8px 0;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, #00d4ff, #66d9ff);
      height: 100%;
      transition: width 0.3s;
    }
    .percentage { color: #66d9ff; font-weight: bold; font-size: 0.95em; }
    .notes-section {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #333;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .checkbox-label {
      flex: 1;
      cursor: pointer;
    }
    textarea {
      width: 100%;
      background: #0a0e27;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 8px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 0.9em;
      margin-top: 6px;
      resize: vertical;
      min-height: 60px;
    }
    textarea:focus { outline: none; border-color: #66d9ff; }
    .input-label { font-size: 0.85em; color: #888; margin-bottom: 4px; display: block; }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      background: #1a3a52;
      color: #4da6ff;
      border: 1px solid #4da6ff;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.2s;
    }
    button:hover { background: #2a4a62; }
    button.danger {
      background: #3a1a1a;
      color: #ff6b6b;
      border-color: #ff6b6b;
    }
    button.danger:hover { background: #4a2a2a; }
    button.success {
      background: #1a3a2a;
      color: #4dff88;
      border-color: #4dff88;
    }
    button.success:hover { background: #2a4a3a; }
    button.warn {
      background: #3a2a1a;
      color: #ffa040;
      border-color: #ffa040;
    }
    .flags-section {
      background: #1a1f3a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 15px;
    }
    .flag-item {
      background: #0a0e27;
      border-left: 3px solid #ff6b6b;
      padding: 10px;
      margin: 8px 0;
      border-radius: 4px;
    }
    .summary-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #1a1f3a;
      border: 1px solid #333;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-number { font-size: 2em; color: #66d9ff; font-weight: bold; }
    .stat-label { color: #888; font-size: 0.9em; margin-top: 5px; }
    .gh-panel {
      background: #1a1f3a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px 15px;
      margin-bottom: 20px;
    }
    .gh-panel-title {
      font-size: 0.85em;
      color: #888;
      font-family: 'Monaco', 'Courier New', monospace;
      margin-bottom: 8px;
    }
    .gh-panel-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .gh-panel input[type="password"] {
      flex: 1;
      min-width: 160px;
      background: #0a0e27;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 0.9em;
      outline: none;
    }
    .gh-panel input[type="password"]:focus { border-color: #66d9ff; }
    .gh-panel-hint {
      font-size: 0.8em;
      color: #555;
      font-family: 'Monaco', 'Courier New', monospace;
      margin-top: 6px;
    }
    .toast {
      background: #1a2a3a;
      border: 1px solid #4da6ff33;
      border-radius: 6px;
      padding: 8px 14px;
      margin-bottom: 14px;
      font-size: 0.9em;
      color: #4da6ff;
      text-align: center;
    }
    .header-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .sync-info {
      font-size: 0.8em;
      color: #555;
      margin-top: 4px;
      font-family: 'Monaco', 'Courier New', monospace;
    }

    /* ── Exam Problem Bank ─────────────────────────────────────────────── */
    .problem-bank {
      background: #1a1f3a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
    }
    .problem-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }
    .problem-filters button {
      padding: 5px 12px;
      font-size: 0.8em;
      border-radius: 20px;
    }
    .problem-filters button.active {
      background: #2a4a62;
      font-weight: bold;
    }
    .problem-card {
      background: #0a0e27;
      border-radius: 6px;
      margin: 8px 0;
      border-left: 3px solid #555;
      overflow: hidden;
    }
    .problem-card[data-status="untriaged"] { border-left-color: #888; }
    .problem-card[data-status="trivial"] { border-left-color: #4dff88; }
    .problem-card[data-status="needs-review"] { border-left-color: #ff6b6b; }
    .problem-card[data-status="promoted"] { border-left-color: #4da6ff; }
    .problem-card[data-status="needs-formula"] { border-left-color: #d97706; }
    .problem-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 12px;
      cursor: pointer;
      gap: 10px;
    }
    .problem-header:hover { background: #141926; }
    .problem-text {
      flex: 1;
      font-size: 0.9em;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .problem-text.collapsed {
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .problem-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .status-badge {
      font-size: 0.7em;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .status-badge[data-status="untriaged"] { background: #333; color: #888; }
    .status-badge[data-status="trivial"] { background: #1a3a2a; color: #4dff88; }
    .status-badge[data-status="needs-review"] { background: #3a1a1a; color: #ff6b6b; }
    .status-badge[data-status="promoted"] { background: #1a2a3a; color: #4da6ff; }
    .status-badge[data-status="needs-formula"] { background: #3a2a1a; color: #d97706; }
    .problem-detail {
      padding: 0 12px 12px;
      border-top: 1px solid #1a1f3a;
    }
    .problem-detail select {
      background: #141926;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 0.85em;
      cursor: pointer;
    }
    .problem-detail select:focus { outline: none; border-color: #66d9ff; }
    .problem-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .source-badge {
      font-size: 0.75em;
      color: #666;
      font-family: 'Monaco', 'Courier New', monospace;
    }
    .bulk-add-section {
      background: #0a0e27;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px;
      margin-top: 15px;
    }
    .bulk-add-section input[type="text"] {
      width: 100%;
      background: #141926;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 0.9em;
      margin-bottom: 8px;
    }
    .bulk-add-section input[type="text"]:focus { outline: none; border-color: #66d9ff; }
    .bank-summary {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      font-size: 0.85em;
    }
    .bank-summary-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .bank-summary-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── localStorage shim ──────────────────────────────────────────────────────
    window.storage = {
      getItem(key) {
        try { return localStorage.getItem(key); } catch (e) { return null; }
      },
      setItem(key, value) {
        try { localStorage.setItem(key, value); } catch (e) { console.error('Storage error:', e); }
      },
    };

    // ── Constants ──────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'christopher-psl-v1';
    const BACKUP_KEY = 'christopher-psl-v1-backup';
    const GH_TOKEN_KEY = 'christopher-psl-gh-token';
    const GH_OWNER = 'grrarr';
    const GH_REPO = 'fufu-poshen-loh';
    const GH_DATA_PATH = 'christopher-psl-data.json';

    const TODAY = new Date().toISOString().split('T')[0];

    const DEFAULT_DATA = {
      modules: [
        { id: 'mod0', name: 'Module 0: Introduction', progress: 98, notesAdded: false, notesComment: '', hasTodos: false, todoComment: '' },
        { id: 'mod1', name: 'Module 1: Algebra Basics', progress: 100, notesAdded: false, notesComment: '', hasTodos: false, todoComment: '' },
        { id: 'mod2', name: 'Module 2: Geometry Tools', progress: 95, notesAdded: false, notesComment: '', hasTodos: false, todoComment: '' },
        { id: 'mod3', name: 'Module 3: Algebra Tools', progress: 98, notesAdded: false, notesComment: '', hasTodos: false, todoComment: '' },
        { id: 'mod4', name: 'Module 4: Combinatorics Tools', progress: 15, notesAdded: false, notesComment: '', hasTodos: false, todoComment: '' },
        { id: 'mod5', name: 'Module 5: Number Theory Tools', progress: 0, notesAdded: false, notesComment: '', hasTodos: false, todoComment: '' },
      ],
      workouts: [
        { id: 'w1a', name: 'Workout 1A: Algebra Basics', progress: 100, notesAdded: false, notesComment: '', hasTodos: false, todoComment: '' },
        { id: 'w1b', name: 'Workout 1B: Algebra Basics', progress: 100, notesAdded: false, notesComment: '', hasTodos: false, todoComment: '' },
        { id: 'w2a', name: 'Workout 2A: Geometry Tools', progress: 0, notesAdded: false, notesComment: '', hasTodos: false, todoComment: '' },
        { id: 'w3a', name: 'Workout 3A: Algebra Tools', progress: 0, notesAdded: false, notesComment: '', hasTodos: false, todoComment: '' },
        { id: 'w4a', name: 'Workout 4A: Combinatorics Tools', progress: 3, notesAdded: false, notesComment: '', hasTodos: false, todoComment: '' },
        { id: 'w5a', name: 'Workout 5A: Number Theory Tools', progress: 0, notesAdded: false, notesComment: '', hasTodos: false, todoComment: '' },
      ],
      flags: [],
      examProblems: [],
      lastUpdated: TODAY,
    };

    // ── GitHub helpers ─────────────────────────────────────────────────────────

    async function ghFetch(token) {
      try {
        const headers = { Accept: 'application/vnd.github.v3+json' };
        if (token) headers.Authorization = `token ${token}`;
        const r = await fetch(
          `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_DATA_PATH}`,
          { headers }
        );
        if (!r.ok) return null;
        const d = await r.json();
        let parsed;
        if (d.content) {
          parsed = JSON.parse(atob(d.content.replace(/\n/g, '')));
        } else if (d.download_url) {
          // File > 1MB: content is null, use download_url instead
          const raw = await fetch(d.download_url);
          parsed = await raw.json();
        } else {
          return null;
        }
        return { data: parsed, sha: d.sha };
      } catch { return null; }
    }

    async function ghWrite(token, data, sha) {
      const content = btoa(unescape(encodeURIComponent(
        JSON.stringify({ version: 1, updated: TODAY, ...data }, null, 2)
      )));
      const r = await fetch(
        `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_DATA_PATH}`,
        {
          method: 'PUT',
          headers: {
            Authorization: `token ${token}`,
            Accept: 'application/vnd.github.v3+json',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message: `Update christopher-psl progress ${TODAY}`,
            content,
            ...(sha ? { sha } : {}),
          }),
        }
      );
      if (!r.ok) throw new Error(r.status);
      return (await r.json()).content.sha;
    }

    // ── App ────────────────────────────────────────────────────────────────────

    function App() {
      const [data, setData] = useState(null);
      const [newFlag, setNewFlag] = useState('');

      // GitHub sync state
      const ghTokenRef = useRef('');
      const ghShaRef = useRef(null);
      const [ghStatus, setGhStatus] = useState('idle'); // idle | loading | synced | saving | error
      const [showGhSetup, setShowGhSetup] = useState(false);
      const [tokenDraft, setTokenDraft] = useState('');
      const [lastSynced, setLastSynced] = useState(null);
      const [toast, setToast] = useState(null);

      const flash = useCallback((msg, duration = 2500) => {
        setToast(msg);
        setTimeout(() => setToast(null), duration);
      }, []);

      // Load on mount
      useEffect(() => {
        (async () => {
          // Load token from localStorage
          let token = '';
          try {
            const t = window.storage.getItem(GH_TOKEN_KEY);
            if (t) { token = t; ghTokenRef.current = t; }
          } catch {}

          // Try GitHub first
          setGhStatus('loading');
          let loaded = null;
          const ghResult = await ghFetch(token || null);
          if (ghResult) {
            ghShaRef.current = ghResult.sha;
            setGhStatus(token ? 'synced' : 'idle');
            setLastSynced(new Date().toLocaleTimeString());
            loaded = ghResult.data;
            // Merge in any missing fields from DEFAULT_DATA
            loaded = mergeWithDefaults(loaded);
          } else {
            setGhStatus(token ? 'error' : 'idle');
          }

          // Fall back to localStorage
          if (!loaded) {
            const stored = window.storage.getItem(STORAGE_KEY);
            const backup = window.storage.getItem(BACKUP_KEY);
            loaded = stored
              ? JSON.parse(stored)
              : backup
              ? JSON.parse(backup)
              : DEFAULT_DATA;
          }

          setData(loaded);
        })();
      }, []);

      // Merge loaded data with default structure (adds new fields if missing)
      function mergeWithDefaults(loaded) {
        if (!loaded) return DEFAULT_DATA;
        const result = { ...DEFAULT_DATA, ...loaded };
        // Ensure modules array has all default entries
        if (!result.modules || result.modules.length === 0) result.modules = DEFAULT_DATA.modules;
        if (!result.workouts || result.workouts.length === 0) result.workouts = DEFAULT_DATA.workouts;
        if (!result.flags) result.flags = [];
        if (!result.examProblems) result.examProblems = [];
        // Backfill new fields on individual items
        const backfill = (item) => ({
          hasTodos: false, todoComment: '',
          notesAdded: false, notesComment: '',
          ...item,
        });
        result.modules = result.modules.map(backfill);
        result.workouts = result.workouts.map(backfill);
        return result;
      }

      const save = useCallback(async (newData) => {
        setData(newData);
        // Always save to localStorage first
        window.storage.setItem(STORAGE_KEY, JSON.stringify(newData));
        window.storage.setItem(BACKUP_KEY, JSON.stringify(newData));

        // Then sync to GitHub if token set
        const token = ghTokenRef.current;
        if (token) {
          setGhStatus('saving');
          try {
            let sha = ghShaRef.current;
            if (!sha) {
              const existing = await ghFetch(token);
              sha = existing?.sha || null;
            }
            const newSha = await ghWrite(token, newData, sha);
            ghShaRef.current = newSha;
            setGhStatus('synced');
            setLastSynced(new Date().toLocaleTimeString());
          } catch {
            setGhStatus('error');
          }
        }
      }, []);

      const updateItem = (type, id, updates) => {
        const newData = { ...data, lastUpdated: TODAY };
        const arr = type === 'module' ? [...data.modules] : [...data.workouts];
        const idx = arr.findIndex(x => x.id === id);
        if (idx >= 0) {
          arr[idx] = { ...arr[idx], ...updates };
          newData[type === 'module' ? 'modules' : 'workouts'] = arr;
          save(newData);
        }
      };

      const addFlag = () => {
        if (!newFlag.trim()) return;
        const newData = {
          ...data,
          flags: [...data.flags, { id: Date.now(), text: newFlag }],
          lastUpdated: TODAY,
        };
        save(newData);
        setNewFlag('');
      };

      const removeFlag = (id) => {
        const newData = {
          ...data,
          flags: data.flags.filter(f => f.id !== id),
          lastUpdated: TODAY,
        };
        save(newData);
      };

      const exportData = () => {
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `christopher-psl-backup-${TODAY}.json`;
        a.click();
        URL.revokeObjectURL(url);
        flash('Exported backup JSON');
      };

      const importData = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          try {
            const parsed = JSON.parse(ev.target.result);
            const merged = mergeWithDefaults(parsed);
            await save(merged);
            flash('Data imported successfully');
          } catch {
            flash('Import failed: invalid JSON');
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const doSaveToken = async () => {
        const t = tokenDraft.trim();
        if (!t) return;
        window.storage.setItem(GH_TOKEN_KEY, t);
        ghTokenRef.current = t;
        setShowGhSetup(false);
        setTokenDraft('');
        setGhStatus('saving');
        try {
          const existing = await ghFetch(t);
          const sha = existing?.sha || null;
          const newSha = await ghWrite(t, data, sha);
          ghShaRef.current = newSha;
          setGhStatus('synced');
          setLastSynced(new Date().toLocaleTimeString());
          flash('Connected to GitHub — synced!');
        } catch {
          setGhStatus('error');
          flash('Token saved, but sync failed — check PAT permissions');
        }
      };

      const doClearToken = () => {
        window.storage.setItem(GH_TOKEN_KEY, '');
        ghTokenRef.current = '';
        ghShaRef.current = null;
        setGhStatus('idle');
        setShowGhSetup(false);
        flash('GitHub sync disabled');
      };

      const fileRef = useRef(null);

      // ── Exam Problem Bank helpers ───────────────────────────────────
      const addExamProblems = (source, textBlock) => {
        if (!textBlock.trim() || !source.trim()) return;
        // Split by blank lines or numbered patterns like "1." "2)" etc.
        const chunks = textBlock.split(/\n\s*\n/).filter(s => s.trim());
        const newProblems = chunks.map((text, i) => ({
          id: Date.now() + i,
          source: source.trim(),
          text: text.trim(),
          status: 'untriaged', // untriaged | trivial | needs-review | promoted | needs-formula
          note: '',
          dateAdded: TODAY,
        }));
        const newData = {
          ...data,
          examProblems: [...(data.examProblems || []), ...newProblems],
          lastUpdated: TODAY,
        };
        save(newData);
        flash(`Added ${newProblems.length} problem${newProblems.length > 1 ? 's' : ''}`);
      };

      const updateProblem = (id, updates) => {
        const newData = {
          ...data,
          examProblems: data.examProblems.map(p => p.id === id ? { ...p, ...updates } : p),
          lastUpdated: TODAY,
        };
        save(newData);
      };

      const deleteProblem = (id) => {
        const newData = {
          ...data,
          examProblems: data.examProblems.filter(p => p.id !== id),
          lastUpdated: TODAY,
        };
        save(newData);
      };

      if (!data) return <div style={{color: '#666', padding: '40px'}}>Loading...</div>;

      const modulesComplete = data.modules.filter(m => m.progress === 100).length;
      const workoutsComplete = data.workouts.filter(w => w.progress === 100).length;
      const modulesWithNotes = data.modules.filter(m => m.notesAdded).length;
      const workoutsWithNotes = data.workouts.filter(w => w.notesAdded).length;
      const totalTodos = data.modules.filter(m => m.hasTodos).length + data.workouts.filter(w => w.hasTodos).length;
      const problems = data.examProblems || [];
      const problemCounts = {
        total: problems.length,
        untriaged: problems.filter(p => p.status === 'untriaged').length,
        trivial: problems.filter(p => p.status === 'trivial').length,
        needsReview: problems.filter(p => p.status === 'needs-review').length,
        promoted: problems.filter(p => p.status === 'promoted').length,
        needsFormula: problems.filter(p => p.status === 'needs-formula').length,
      };

      const ghColor = ghStatus === 'synced' ? '#4dff88'
        : ghStatus === 'error' ? '#ff6b6b'
        : (ghStatus === 'saving' || ghStatus === 'loading') ? '#ffa040'
        : '#888';

      const ghLabel = ghStatus === 'saving' ? 'Saving...'
        : ghStatus === 'loading' ? 'Loading...'
        : ghStatus === 'synced' ? '● GH'
        : ghStatus === 'error' ? '⚠ GH'
        : 'GH';

      return (
        <div className="container">
          <div className="header-toolbar">
            <div>
              <h1>Christopher's Po-Shen Loh Progress</h1>
              <div className="header-info">
                <strong>App URL:</strong> https://grrarr.github.io/fufu-poshen-loh/ &nbsp;|&nbsp;
                <strong>Last updated:</strong> {data.lastUpdated}
              </div>
              {lastSynced && ghStatus === 'synced' && (
                <div className="sync-info">Last synced to GitHub: {lastSynced}</div>
              )}
            </div>
            <div className="header-actions">
              <button onClick={exportData} title="Download JSON backup">Export JSON</button>
              <button onClick={() => fileRef.current?.click()} title="Import from JSON file">Import JSON</button>
              <input ref={fileRef} type="file" accept=".json" onChange={importData} style={{display: 'none'}} />
              <button
                onClick={() => setShowGhSetup(!showGhSetup)}
                style={{
                  background: '#1a3a52',
                  color: ghColor,
                  border: `1px solid ${ghColor}`,
                  padding: '8px 16px',
                  borderRadius: '4px',
                  cursor: 'pointer',
                  fontSize: '0.9em',
                  transition: 'all 0.2s',
                }}
                title={
                  ghStatus === 'synced' ? `Synced to GitHub (${GH_DATA_PATH})`
                  : ghStatus === 'error' ? 'GitHub sync error — click to reconfigure'
                  : 'Set up GitHub sync'
                }
              >
                {ghLabel}
              </button>
            </div>
          </div>

          {/* GitHub setup panel */}
          {showGhSetup && (
            <div className="gh-panel">
              <div className="gh-panel-title">
                GitHub Personal Access Token — syncs to {GH_OWNER}/{GH_REPO}/{GH_DATA_PATH}
              </div>
              <div className="gh-panel-row">
                <input
                  type="password"
                  value={tokenDraft}
                  onChange={(e) => setTokenDraft(e.target.value)}
                  onKeyDown={(e) => e.key === 'Enter' && doSaveToken()}
                  placeholder="ghp_..."
                />
                <button
                  onClick={doSaveToken}
                  disabled={!tokenDraft.trim()}
                  className="success"
                  style={{opacity: tokenDraft.trim() ? 1 : 0.4}}
                >
                  Save
                </button>
                {ghTokenRef.current && (
                  <button onClick={doClearToken} className="danger">Disconnect</button>
                )}
              </div>
              <div className="gh-panel-hint">
                Create at github.com/settings/tokens — needs Contents: Read &amp; Write on {GH_REPO}
              </div>
            </div>
          )}

          {/* Toast */}
          {toast && <div className="toast">{toast}</div>}

          <div className="summary-stats">
            <div className="stat-card">
              <div className="stat-number">{modulesComplete}/6</div>
              <div className="stat-label">Modules Complete</div>
            </div>
            <div className="stat-card">
              <div className="stat-number">{workoutsComplete}/6</div>
              <div className="stat-label">Workouts Complete</div>
            </div>
            <div className="stat-card">
              <div className="stat-number">{modulesWithNotes}</div>
              <div className="stat-label">Modules w/ Notes</div>
            </div>
            <div className="stat-card">
              <div className="stat-number">{workoutsWithNotes}</div>
              <div className="stat-label">Workouts w/ Notes</div>
            </div>
            <div className="stat-card">
              <div className="stat-number" style={{color: totalTodos > 0 ? '#ffa040' : '#66d9ff'}}>{totalTodos}</div>
              <div className="stat-label">Has TODOs</div>
            </div>
            <div className="stat-card">
              <div className="stat-number" style={{color: problemCounts.untriaged > 0 ? '#ffa040' : '#66d9ff'}}>{problemCounts.total}</div>
              <div className="stat-label">Exam Problems</div>
            </div>
          </div>

          <div className="section">
            <div className="section-title">Modules</div>
            <div className="grid">
              {data.modules.map(mod => (
                <ItemCard key={mod.id} item={mod} type="module" onUpdate={(updates) => updateItem('module', mod.id, updates)} />
              ))}
            </div>
          </div>

          <div className="section">
            <div className="section-title">Workouts</div>
            <div className="grid">
              {data.workouts.map(wo => (
                <ItemCard key={wo.id} item={wo} type="workout" onUpdate={(updates) => updateItem('workout', wo.id, updates)} />
              ))}
            </div>
          </div>

          <div className="section">
            <div className="section-title">Manual Flags (Exams Not Done, etc.)</div>
            <div className="flags-section">
              {data.flags.length > 0 && (
                <div style={{marginBottom: '15px'}}>
                  {data.flags.map(flag => (
                    <div key={flag.id} className="flag-item">
                      <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start'}}>
                        <div>{flag.text}</div>
                        <button className="danger" onClick={() => removeFlag(flag.id)} style={{padding: '4px 8px', fontSize: '0.8em'}}>x</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              <textarea
                value={newFlag}
                onChange={(e) => setNewFlag(e.target.value)}
                placeholder={"e.g., Module 0 - Exam 2 not done\nModule 3 - Exam final not done"}
              />
              <button onClick={addFlag} className="success" style={{marginTop: '10px'}}>Add Flag</button>
            </div>
          </div>

          <div className="section">
            <div className="section-title">Exam Problem Bank</div>
            <ExamProblemBank
              problems={problems}
              counts={problemCounts}
              onAdd={addExamProblems}
              onUpdate={updateProblem}
              onDelete={deleteProblem}
            />
          </div>
        </div>
      );
    }

    function ItemCard({ item, type, onUpdate }) {
      const [editingComment, setEditingComment] = useState(false);
      const [editingTodo, setEditingTodo] = useState(false);

      return (
        <div className="card">
          <div className="card-title">{item.name}</div>

          <div>
            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px'}}>
              <span className="percentage">{item.progress}%</span>
              <input
                type="range"
                min="0"
                max="100"
                value={item.progress}
                onChange={(e) => onUpdate({progress: parseInt(e.target.value)})}
                style={{flex: 1, marginLeft: '10px', cursor: 'pointer'}}
              />
            </div>
            <div className="progress-bar">
              <div className="progress-fill" style={{width: `${item.progress}%`}}></div>
            </div>
          </div>

          <div className="notes-section">
            <div className="checkbox-group">
              <input
                type="checkbox"
                id={`${item.id}-notes`}
                checked={item.notesAdded}
                onChange={(e) => onUpdate({notesAdded: e.target.checked})}
              />
              <label className="checkbox-label" htmlFor={`${item.id}-notes`}>
                Spaced rep notes added
              </label>
            </div>
            {(item.notesAdded || item.notesComment) && (
              <div style={{marginTop: '10px'}}>
                {editingComment || !item.notesComment ? (
                  <textarea
                    value={item.notesComment}
                    onChange={(e) => onUpdate({notesComment: e.target.value})}
                    placeholder="e.g., Lessons 1-10 noted, 14-15 missing"
                    onBlur={() => setEditingComment(false)}
                    autoFocus={editingComment}
                  />
                ) : (
                  <div
                    onClick={() => setEditingComment(true)}
                    style={{
                      background: '#0a0e27',
                      padding: '8px',
                      borderRadius: '4px',
                      border: '1px solid #333',
                      cursor: 'pointer',
                      fontSize: '0.9em',
                      color: '#aaa',
                    }}
                  >
                    {item.notesComment}
                  </div>
                )}
              </div>
            )}
          </div>

          <div className="notes-section" style={{borderTopColor: item.hasTodos ? '#ffa04055' : '#333'}}>
            <div className="checkbox-group">
              <input
                type="checkbox"
                id={`${item.id}-todos`}
                checked={item.hasTodos}
                onChange={(e) => onUpdate({hasTodos: e.target.checked})}
              />
              <label className="checkbox-label" htmlFor={`${item.id}-todos`} style={{color: item.hasTodos ? '#ffa040' : undefined}}>
                Has TODOs
              </label>
            </div>
            {(item.hasTodos || item.todoComment) && (
              <div style={{marginTop: '10px'}}>
                {editingTodo || !item.todoComment ? (
                  <textarea
                    value={item.todoComment}
                    onChange={(e) => onUpdate({todoComment: e.target.value})}
                    placeholder="e.g., Need to do Exam 2, write down formulas for X"
                    onBlur={() => setEditingTodo(false)}
                    autoFocus={editingTodo}
                    style={{borderColor: item.hasTodos ? '#ffa04055' : '#333'}}
                  />
                ) : (
                  <div
                    onClick={() => setEditingTodo(true)}
                    style={{
                      background: '#0a0e27',
                      padding: '8px',
                      borderRadius: '4px',
                      border: `1px solid ${item.hasTodos ? '#ffa04055' : '#333'}`,
                      cursor: 'pointer',
                      fontSize: '0.9em',
                      color: '#cca050',
                    }}
                  >
                    {item.todoComment}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Exam Problem Bank ──────────────────────────────────────────────

    const STATUS_META = {
      untriaged:      { label: 'Untriaged',      color: '#888' },
      trivial:        { label: 'Trivial',         color: '#4dff88' },
      'needs-review': { label: 'Needs Review',    color: '#ff6b6b' },
      promoted:       { label: 'In Spaced Rep',   color: '#4da6ff' },
      'needs-formula':{ label: 'Needs Formula',   color: '#d97706' },
    };

    function ExamProblemBank({ problems, counts, onAdd, onUpdate, onDelete }) {
      const [filter, setFilter] = useState('all');
      const [sourceFilter, setSourceFilter] = useState('all');
      const [showBulkAdd, setShowBulkAdd] = useState(false);
      const [bulkSource, setBulkSource] = useState('');
      const [bulkText, setBulkText] = useState('');
      const [showTrivial, setShowTrivial] = useState(false);

      const sources = [...new Set(problems.map(p => p.source))].sort();

      let filtered = problems;
      if (filter !== 'all') filtered = filtered.filter(p => p.status === filter);
      if (sourceFilter !== 'all') filtered = filtered.filter(p => p.source === sourceFilter);
      // Hide trivial by default unless filter is set to trivial or showTrivial is on
      if (filter !== 'trivial' && !showTrivial) filtered = filtered.filter(p => p.status !== 'trivial');

      const doBulkAdd = () => {
        onAdd(bulkSource, bulkText);
        setBulkText('');
      };

      return (
        <div className="problem-bank">
          {/* Summary dots */}
          <div className="bank-summary">
            {Object.entries(STATUS_META).map(([key, meta]) => {
              const count = key === 'untriaged' ? counts.untriaged
                : key === 'trivial' ? counts.trivial
                : key === 'needs-review' ? counts.needsReview
                : key === 'promoted' ? counts.promoted
                : counts.needsFormula;
              return (
                <div key={key} className="bank-summary-item">
                  <span className="bank-summary-dot" style={{background: meta.color}}></span>
                  <span style={{color: meta.color}}>{count}</span>
                  <span style={{color: '#666'}}>{meta.label}</span>
                </div>
              );
            })}
          </div>

          {/* Filter bar */}
          <div className="problem-filters">
            {[
              ['all', `All (${counts.total})`],
              ['untriaged', `Untriaged (${counts.untriaged})`],
              ['needs-review', `Needs Review (${counts.needsReview})`],
              ['needs-formula', `Needs Formula (${counts.needsFormula})`],
              ['promoted', `In Spaced Rep (${counts.promoted})`],
              ['trivial', `Trivial (${counts.trivial})`],
            ].map(([key, label]) => (
              <button
                key={key}
                className={filter === key ? 'active' : ''}
                onClick={() => { setFilter(key); if (key === 'trivial') setShowTrivial(true); }}
                style={filter === key ? {
                  color: key === 'all' ? '#4da6ff' : STATUS_META[key]?.color || '#4da6ff',
                  borderColor: key === 'all' ? '#4da6ff' : STATUS_META[key]?.color || '#4da6ff',
                } : {}}
              >
                {label}
              </button>
            ))}
            {/* Source filter */}
            {sources.length > 1 && (
              <select
                value={sourceFilter}
                onChange={(e) => setSourceFilter(e.target.value)}
                style={{
                  background: '#141926', color: '#e0e0e0', border: '1px solid #333',
                  borderRadius: '20px', padding: '5px 12px', fontSize: '0.8em', cursor: 'pointer',
                }}
              >
                <option value="all">All sources</option>
                {sources.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            )}
          </div>

          {/* Show/hide trivial toggle (when viewing All) */}
          {filter === 'all' && counts.trivial > 0 && (
            <div style={{marginBottom: '10px'}}>
              <label style={{fontSize: '0.8em', color: '#666', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '6px'}}>
                <input type="checkbox" checked={showTrivial} onChange={(e) => setShowTrivial(e.target.checked)} />
                Show trivial ({counts.trivial})
              </label>
            </div>
          )}

          {/* Problem list */}
          {filtered.length === 0 && problems.length > 0 && (
            <div style={{color: '#555', padding: '20px', textAlign: 'center', fontSize: '0.9em'}}>
              No problems match this filter
            </div>
          )}
          {filtered.length === 0 && problems.length === 0 && (
            <div style={{color: '#555', padding: '20px', textAlign: 'center', fontSize: '0.9em'}}>
              No exam problems yet. Use "Add Problems" below to paste extracted problems.
            </div>
          )}
          {filtered.map(p => (
            <ProblemCard key={p.id} problem={p} onUpdate={onUpdate} onDelete={onDelete} />
          ))}

          {/* Bulk add */}
          <div style={{marginTop: '15px'}}>
            <button onClick={() => setShowBulkAdd(!showBulkAdd)} className={showBulkAdd ? 'warn' : 'success'}>
              {showBulkAdd ? 'Cancel' : '+ Add Problems'}
            </button>
          </div>
          {showBulkAdd && (
            <div className="bulk-add-section">
              <div style={{marginBottom: '8px', fontSize: '0.85em', color: '#888'}}>
                Paste problems below. Separate each problem with a blank line.
              </div>
              <input
                type="text"
                value={bulkSource}
                onChange={(e) => setBulkSource(e.target.value)}
                placeholder="Source (e.g., Module 0 - Mini Test 3, Workout 1A - Final Exam)"
              />
              <textarea
                value={bulkText}
                onChange={(e) => setBulkText(e.target.value)}
                placeholder={"Problem 1 text here...\n\nProblem 2 text here...\n\nProblem 3 text here..."}
                style={{minHeight: '120px'}}
              />
              <button
                onClick={doBulkAdd}
                className="success"
                style={{marginTop: '8px', opacity: bulkSource.trim() && bulkText.trim() ? 1 : 0.4}}
                disabled={!bulkSource.trim() || !bulkText.trim()}
              >
                Add {bulkText.split(/\n\s*\n/).filter(s => s.trim()).length || 0} Problem(s)
              </button>
            </div>
          )}
        </div>
      );
    }

    function ProblemCard({ problem, onUpdate, onDelete }) {
      const [expanded, setExpanded] = useState(false);
      const [editingNote, setEditingNote] = useState(false);
      const [editingImage, setEditingImage] = useState(false);
      const [confirmDelete, setConfirmDelete] = useState(false);
      const [imgError, setImgError] = useState(false);
      const meta = STATUS_META[problem.status] || STATUS_META.untriaged;
      const hasImage = !!(problem.imageUrl && problem.imageUrl.trim());

      return (
        <div className="problem-card" data-status={problem.status}>
          <div className="problem-header" onClick={() => setExpanded(!expanded)}>
            <div className={`problem-text ${expanded ? '' : 'collapsed'}`}>
              {problem.text}
            </div>
            <div className="problem-meta">
              {hasImage && <span style={{fontSize: '0.8em', color: '#666'}} title="Has image">IMG</span>}
              <span className="status-badge" data-status={problem.status}>{meta.label}</span>
            </div>
          </div>
          {expanded && (
            <div className="problem-detail">
              <div className="source-badge">{problem.source} &middot; Added {problem.dateAdded}</div>

              {/* Image display */}
              {hasImage && !imgError && (
                <div style={{marginTop: '10px'}}>
                  <img
                    src={problem.imageUrl}
                    alt="Problem diagram"
                    onError={() => setImgError(true)}
                    style={{
                      maxWidth: '100%',
                      maxHeight: '400px',
                      borderRadius: '4px',
                      border: '1px solid #333',
                      background: '#fff',
                    }}
                  />
                </div>
              )}
              {hasImage && imgError && (
                <div style={{marginTop: '10px', fontSize: '0.8em', color: '#ff6b6b'}}>
                  Image failed to load: {problem.imageUrl}
                </div>
              )}

              <div className="problem-actions">
                <select
                  value={problem.status}
                  onChange={(e) => onUpdate(problem.id, { status: e.target.value })}
                  onClick={(e) => e.stopPropagation()}
                >
                  <option value="untriaged">Untriaged</option>
                  <option value="trivial">Trivial (he knows it)</option>
                  <option value="needs-review">Needs Review</option>
                  <option value="needs-formula">Needs Formula / Algorithm Card</option>
                  <option value="promoted">Promoted to Spaced Rep</option>
                </select>
                <button
                  onClick={(e) => { e.stopPropagation(); setEditingImage(!editingImage); }}
                  style={{padding: '4px 10px', fontSize: '0.8em', color: hasImage ? '#4dff88' : '#4da6ff', borderColor: hasImage ? '#4dff88' : '#4da6ff'}}
                >
                  {hasImage ? 'Edit Image' : '+ Image'}
                </button>
                {!confirmDelete ? (
                  <button className="danger" onClick={() => setConfirmDelete(true)} style={{padding: '4px 10px', fontSize: '0.8em'}}>Delete</button>
                ) : (
                  <>
                    <button className="danger" onClick={() => onDelete(problem.id)} style={{padding: '4px 10px', fontSize: '0.8em'}}>Confirm</button>
                    <button onClick={() => setConfirmDelete(false)} style={{padding: '4px 10px', fontSize: '0.8em'}}>Cancel</button>
                  </>
                )}
              </div>

              {/* Image URL input */}
              {editingImage && (
                <div style={{marginTop: '8px'}}>
                  <div style={{fontSize: '0.8em', color: '#666', marginBottom: '4px'}}>
                    Image URL (e.g., https://raw.githubusercontent.com/grrarr/fufu-poshen-loh/master/images/mod3-final-q7.png)
                  </div>
                  <div style={{display: 'flex', gap: '6px'}}>
                    <input
                      type="text"
                      value={problem.imageUrl || ''}
                      onChange={(e) => { onUpdate(problem.id, { imageUrl: e.target.value }); setImgError(false); }}
                      onClick={(e) => e.stopPropagation()}
                      placeholder="Paste image URL..."
                      style={{
                        flex: 1, background: '#141926', color: '#e0e0e0',
                        border: '1px solid #333', borderRadius: '4px',
                        padding: '6px 8px', fontSize: '0.85em',
                      }}
                    />
                    {hasImage && (
                      <button
                        className="danger"
                        onClick={(e) => { e.stopPropagation(); onUpdate(problem.id, { imageUrl: '' }); setImgError(false); }}
                        style={{padding: '4px 10px', fontSize: '0.8em'}}
                      >
                        Remove
                      </button>
                    )}
                  </div>
                </div>
              )}

              {/* Note field */}
              <div style={{marginTop: '8px'}}>
                {editingNote || !problem.note ? (
                  <textarea
                    value={problem.note}
                    onChange={(e) => onUpdate(problem.id, { note: e.target.value })}
                    onBlur={() => setEditingNote(false)}
                    autoFocus={editingNote}
                    placeholder="Notes (e.g., needs trapezoid area formula card, promote with source 'PSL Mod 3 Q7')"
                    style={{minHeight: '40px'}}
                    onClick={(e) => e.stopPropagation()}
                  />
                ) : (
                  <div
                    onClick={(e) => { e.stopPropagation(); setEditingNote(true); }}
                    style={{
                      background: '#141926',
                      padding: '6px 8px',
                      borderRadius: '4px',
                      border: '1px solid #333',
                      cursor: 'pointer',
                      fontSize: '0.85em',
                      color: '#aaa',
                    }}
                  >
                    {problem.note}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
